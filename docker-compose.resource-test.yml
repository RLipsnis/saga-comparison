# Resource-constrained profiles for scaling experiments.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.resource-test.yml up -d
#
# Applies CPU/memory limits to BOTH the infrastructure containers
# (Temporal/RabbitMQ/Postgres) AND the .NET service containers where the
# actual saga work runs. The latter is the variable that previously was NOT
# constrained — without it the resource-scaling test mostly measured Postgres
# pressure instead of saga-pattern overhead.
#
# Suggested test matrix (set via env vars on the run-resource-scaling-test.sh
# wrapper or exported before `docker compose up`):
#
#   Profile     | Infra CPU | Infra RAM | Service CPU | Service RAM
#   ------------|----------|----------|-------------|-------------
#   Constrained | 0.5      | 256M     | 0.5         | 256M
#   Default     | 1.0      | 512M     | 1.0         | 512M
#   Generous    | 2.0      | 1024M    | 2.0         | 1024M
#   Unlimited   | (omit this file)

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  temporal:
    deploy:
      resources:
        limits:
          cpus: "${TEMPORAL_CPUS:-1.0}"
          memory: "${TEMPORAL_MEMORY:-512M}"
        reservations:
          cpus: "0.25"
          memory: 128M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: "${RABBITMQ_CPUS:-1.0}"
          memory: "${RABBITMQ_MEMORY:-512M}"
        reservations:
          cpus: "0.25"
          memory: 128M

  postgres:
    deploy:
      resources:
        limits:
          cpus: "${POSTGRES_CPUS:-1.0}"
          memory: "${POSTGRES_MEMORY:-512M}"

  # ── .NET services (where the actual saga work runs) ──────────────────────
  # All .NET services share one CPU/RAM budget per profile via SERVICE_CPUS /
  # SERVICE_MEMORY. OrderService is hottest (workflow worker / state machine),
  # so it gets a dedicated knob in case you want to throttle it independently.
  order-service:
    deploy:
      resources:
        limits:
          cpus: "${ORDER_CPUS:-${SERVICE_CPUS:-1.0}}"
          memory: "${ORDER_MEMORY:-${SERVICE_MEMORY:-512M}}"

  inventory-service:
    deploy:
      resources:
        limits:
          cpus: "${SERVICE_CPUS:-1.0}"
          memory: "${SERVICE_MEMORY:-512M}"

  payment-service:
    deploy:
      resources:
        limits:
          cpus: "${SERVICE_CPUS:-1.0}"
          memory: "${SERVICE_MEMORY:-512M}"

  shipping-service:
    deploy:
      resources:
        limits:
          cpus: "${SERVICE_CPUS:-1.0}"
          memory: "${SERVICE_MEMORY:-512M}"

  notification-service:
    deploy:
      resources:
        limits:
          cpus: "${SERVICE_CPUS:-1.0}"
          memory: "${SERVICE_MEMORY:-512M}"

  api-gateway:
    deploy:
      resources:
        limits:
          cpus: "${GATEWAY_CPUS:-${SERVICE_CPUS:-1.0}}"
          memory: "${GATEWAY_MEMORY:-${SERVICE_MEMORY:-256M}}"
